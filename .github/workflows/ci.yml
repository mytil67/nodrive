name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Doit correspondre à l'environnement de dev (npm 11) : le lockfile est
          # généré par npm 11, qui élague des deps optionnelles @esbuild/* que le
          # npm 10 de Node 20 réclame → `npm ci` échouait. Node 24 = npm 11.
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: cd frontend && npm run build
